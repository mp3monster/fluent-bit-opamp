<system>
    log_level error
</system>

# service_instance_id: fluentd-__hostname__

<source>
  @type monitor_agent
  bind 127.0.0.1
  port 2020
  log_level info
</source>

<source>
    @type dummy
    tag dummy
    auto_increment_key counter
    dummy {"hello": "world"}
</source>

# accept all log events regardless of tag and write them to the console
<match *>
    @type file
    path fluentd.out
</match>
